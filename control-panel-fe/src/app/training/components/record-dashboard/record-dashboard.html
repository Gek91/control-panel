<app-module-detail>
  <h2>Exercise Dashboard</h2>
  <app-module-filter>
    <form #filterForm="ngForm" (change)="loadRecordsForExercise()">
      <div class="form-group">
        <label for="exercise">Exercise</label>
        <select id="exercise" name="exercise" [(ngModel)]="exerciseId">
          @for (exercise of exercises; track exercise.id) {
            <option [value]="exercise.id">{{ exercise.name }}</option>
          }
        </select>
      </div>
    </form>
  </app-module-filter>
  <app-module-content-row>
    <app-module-panel [colList]="true">
      <h3>Records</h3>
      <app-module-table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Weight (kg)</th>
            <th>Percentage</th>
          </tr>
        </thead>
        <tbody>
          @for (record of records; track record.id) {
            <tr>
              <td>{{ record.date | date: 'dd/MM/yyyy' }}</td>
              <td>{{ record.weight }}</td>
              <td>{{ record.percentage }}</td>
            </tr>
          }
        </tbody>
      </app-module-table>
    </app-module-panel>
    <app-module-wide-col>
      <canvas
        baseChart
        [data]="lineChartData"
        [options]="lineChartOptions"
        [type]="lineChartType"
      ></canvas>
    </app-module-wide-col>
  </app-module-content-row>
</app-module-detail>
