# =============================================================================
# Production profile overrides
# Activated with: -Dspring.profiles.active=prod  (or SPRING_PROFILES_ACTIVE=prod)
# Common settings live in application.properties; only prod-specific overrides
# go here.
# =============================================================================

# -----------------------------------------------------------------------------
# Datasource (PostgreSQL)
# Credentials MUST come from environment variables, never hardcoded.
# Provide: DB_URL, DB_USERNAME, DB_PASSWORD
# -----------------------------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP). Tune based on infra.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
# Schema is managed by migrations (Flyway, see I11), never auto-modified in prod.
# 'validate' verifies entity mapping vs actual schema at startup; fail fast on drift.
spring.jpa.hibernate.ddl-auto=validate

# Disable Open-Session-In-View: forces transaction boundaries to live in the
# service layer (where they belong) and avoids accidental lazy loading from
# controllers / view rendering.
spring.jpa.open-in-view=false

# Never log SQL in prod (use a profiler / DB observability instead).
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# -----------------------------------------------------------------------------
# SQL initialization
# -----------------------------------------------------------------------------
# schema.sql / data.sql are dev-only convenience: never run them in prod.
spring.sql.init.mode=never

# -----------------------------------------------------------------------------
# Web server
# -----------------------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# Never leak stack traces or exception messages to clients.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Response compression for JSON payloads.
server.compression.enabled=true
server.compression.mime-types=application/json,application/problem+json,text/plain
server.compression.min-response-size=1024

# Forward headers (required when behind a reverse proxy / load balancer).
server.forward-headers-strategy=framework

# -----------------------------------------------------------------------------
# Actuator
# In prod expose only health and info publicly. Metrics / Prometheus should
# be reachable only on an internal network or behind authentication.
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=false

# -----------------------------------------------------------------------------
# Springdoc / Swagger
# Disable Swagger UI in prod; OpenAPI spec endpoint optional.
# -----------------------------------------------------------------------------
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# -----------------------------------------------------------------------------
# DevTools must be disabled in prod (it's already runtime/optional, but be explicit).
# -----------------------------------------------------------------------------
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Logging (pattern + appenders) is profile-aware via logback-spring.xml.
# Per-package overrides go here if needed:
# logging.level.cash_manager=INFO
