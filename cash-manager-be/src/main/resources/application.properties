spring.application.name=cash-manager

# Embedded H2 with PostgreSQL syntax mode for dev/local runs.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none

# Logging is configured via logback-spring.xml (profile-aware: dev/default/test = human-readable, prod = JSON)

#Enable actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics