# Test properties: la datasource viene fornita da TestcontainersConfiguration via @ServiceConnection.
# Il setup del DB e' gestito esclusivamente dall'annotation @Sql sui test (BEFORE_TEST_METHOD),
# quindi disabilitiamo l'inizializzazione SQL automatica all'avvio del context.

spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

# I test @DataJpaTest usano @TestConfiguration per istanziare i bean di service/repository con i
# propri @Bean. Siccome CashManagerApplication importa comunque l'intero grafo dei @Configuration,
# alcune definizioni si sovrappongono: permettiamo l'override solo in ambiente di test.
spring.main.allow-bean-definition-overriding=true

# Riduce il rumore nei log
logging.level.org.hibernate.SQL=warn
logging.level.org.testcontainers=warn
logging.level.com.zaxxer.hikari=warn
